version: '3.9'

services:
  complaint-handler:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_PROJECT=complaintforge-complaint-handler
      - OUTBOUND_COMMUNICATION_ENABLED=${OUTBOUND_COMMUNICATION_ENABLED:-true}
      - OTEL_SERVICE_NAME=complaintforge-complaint-handler
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-https://otlp.nr-data.net}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}

  a2a-specialist:
    build: ./a2a_refund_specialist_service
    ports:
      - "8001:8001"
    env_file:
      - ./a2a_refund_specialist_service/.env
    restart: unless-stopped
    environment:
      - OTEL_SERVICE_NAME=complaintforge-a2a-specialist
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-https://otlp.nr-data.net}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}

